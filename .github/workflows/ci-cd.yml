# CI : Maven + Angular sur chaque PR / push
# CD : publication des images sur GHCR (branche main uniquement)
#
# Déploiement Kubernetes : voir docs/DEPLOIEMENT-KUBERNETES.md (kubectl / kustomize / Argo CD)

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Package backend
        run: mvn -B -f backend/pom.xml package -DskipTests

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npx ng build

  docker-push:
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Préfixe d’images (GHCR en minuscules)
        run: |
          echo "IMAGE_PREFIX=${{ env.REGISTRY }}/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/task-manager-backend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/task-manager-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/task-manager-frontend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/task-manager-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-k8s:
    needs: [docker-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Windows, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Vérifier les secrets de déploiement
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        shell: powershell
        run: |
          if ([string]::IsNullOrWhiteSpace($env:POSTGRES_PASSWORD) -or [string]::IsNullOrWhiteSpace($env:JWT_SECRET)) {
            throw "Missing required deployment secrets (POSTGRES_PASSWORD, JWT_SECRET)."
          }

      - name: Installer kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Configurer kubeconfig (optionnel)
        shell: powershell
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:KUBE_CONFIG_DATA)) {
            $kubeDir = Join-Path $env:USERPROFILE ".kube"
            New-Item -ItemType Directory -Path $kubeDir -Force | Out-Null
            $kubeConfigPath = Join-Path $kubeDir "config"
            [IO.File]::WriteAllBytes($kubeConfigPath, [Convert]::FromBase64String($env:KUBE_CONFIG_DATA))
          }

      - name: Vérifier connexion cluster
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          kubectl config current-context
          if (-not $?) { throw "Failed to read current kubectl context." }
          kubectl get nodes
          if (-not $?) { throw "Failed to list cluster nodes." }

      - name: Créer / mettre à jour le secret applicatif
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          kubectl create namespace task-manager --dry-run=client -o yaml | kubectl apply -f -
          if (-not $?) { throw "Failed to create/apply namespace task-manager." }
          kubectl create secret generic task-manager-secrets --namespace=task-manager --from-literal=postgres-password="${{ secrets.POSTGRES_PASSWORD }}" --from-literal=jwt-secret="${{ secrets.JWT_SECRET }}" --dry-run=client -o yaml | kubectl apply -f -
          if (-not $?) { throw "Failed to create/apply task-manager-secrets." }

      - name: Déployer sur Kubernetes
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $ownerLc = "${{ github.repository_owner }}".ToLowerInvariant()
          $backendImage = "${{ env.REGISTRY }}/$ownerLc/task-manager-backend:${{ github.sha }}"
          $frontendImage = "${{ env.REGISTRY }}/$ownerLc/task-manager-frontend:${{ github.sha }}"
          kubectl apply -k k8s
          if (-not $?) { throw "Failed to apply Kubernetes manifests." }
          kubectl -n task-manager set image deployment/backend backend=$backendImage
          if (-not $?) { throw "Failed to set backend deployment image." }
          kubectl -n task-manager set image deployment/frontend nginx=$frontendImage
          if (-not $?) { throw "Failed to set frontend deployment image." }
          kubectl rollout status deployment/backend -n task-manager --timeout=600s
          if (-not $?) { throw "Backend rollout did not complete successfully." }
          kubectl rollout status deployment/frontend -n task-manager --timeout=600s
          if (-not $?) { throw "Frontend rollout did not complete successfully." }
