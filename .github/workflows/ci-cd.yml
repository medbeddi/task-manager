# CI : Maven + Angular sur chaque PR / push
# CD : publication des images sur GHCR (branche main uniquement)
#
# Déploiement Kubernetes : voir docs/DEPLOIEMENT-KUBERNETES.md (kubectl / kustomize / Argo CD)

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Package backend
        run: mvn -B -f backend/pom.xml package -DskipTests

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npx ng build

  docker-push:
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Préfixe d’images (GHCR en minuscules)
        run: |
          echo "IMAGE_PREFIX=${{ env.REGISTRY }}/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/task-manager-backend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/task-manager-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/task-manager-frontend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/task-manager-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-k8s:
    needs: [docker-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.KUBE_CONFIG_DATA != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Installer kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "latest"

      - name: Configurer kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Créer / mettre à jour le secret applicatif
        run: |
          kubectl create namespace task-manager --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic task-manager-secrets \
            --namespace=task-manager \
            --from-literal=postgres-password='${{ secrets.POSTGRES_PASSWORD }}' \
            --from-literal=jwt-secret='${{ secrets.JWT_SECRET }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Déployer sur Kubernetes
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          cd k8s
          kustomize edit set image task-manager-backend=${{ env.REGISTRY }}/$OWNER_LC/task-manager-backend:${{ github.sha }}
          kustomize edit set image task-manager-frontend=${{ env.REGISTRY }}/$OWNER_LC/task-manager-frontend:${{ github.sha }}
          kubectl apply -k .
          kubectl rollout status deployment/backend -n task-manager --timeout=180s
          kubectl rollout status deployment/frontend -n task-manager --timeout=180s
