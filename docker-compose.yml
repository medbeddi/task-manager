services:
  postgres:
    image: postgres:16-alpine
    container_name: task-manager-postgres
    environment:
      POSTGRES_USER: taskmanager
      POSTGRES_PASSWORD: taskmanager
      POSTGRES_DB: taskmanager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskmanager -d taskmanager"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: task-manager-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taskmanager
      SPRING_DATASOURCE_USERNAME: taskmanager
      SPRING_DATASOURCE_PASSWORD: taskmanager
      APP_JWT_SECRET: TaskManagerDevJwtSecretKeyMustBeAtLeast32BytesLongForHS256
      APP_JWT_EXPIRATION_MS: "86400000"

  frontend:
    build: ./frontend
    container_name: task-manager-frontend
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  postgres_data:
